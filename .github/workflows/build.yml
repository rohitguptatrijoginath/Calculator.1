name: Build Kivy APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # === Java 17 सेट करें (Gradle के लिए जरूरी) ===
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          python3-dev python3-pip build-essential libsqlite3-dev sqlite3 \
          bzip2 libbz2-dev liblzma-dev libreadline-dev uuid-dev libgdbm-dev \
          tk-dev libdb5.3-dev libexpat1-dev libmpdec-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r25b
          ANDROID_NDK_ROOT: /home/runner/.buildozer/android/platform/android-ndk-r25b
          ANDROIDAPI: 31
          NDKAPI: 21
          BUILDOZER_ALLOW_ORG_NAME_START: 1
          ANDROID_NDK: /home/runner/.buildozer/android/platform/android-ndk-r25b

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
